name: Fleetwatch
options:
  bundleIdPrefix: com.hadimulia
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  FleetwatchCore:
    path: Core

targets:
  FleetwatchWidget:
    type: app-extension
    platform: macOS
    sources:
      - Widget/Sources
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Fleetwatch
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hadimulia.fleetwatch.widget
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: Widget/FleetwatchWidget.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  Fleetwatch:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: FleetwatchCore
        products:
          - RulesKit
          - ScannerKit
          - InventoryKit
          - LedgerKit
          - ThermalKit
          - HonestKit
          - MemoryKit
          - BatteryKit
          - FleetKit
      - target: FleetwatchWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hadimulia.fleetwatch
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: App/Fleetwatch.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Hadi Mulia"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        COMBINE_HIDPI_IMAGES: YES
        DEAD_CODE_STRIPPING: YES
